limits:
  - name: Tenant-Scoped Limits
    scope: tenant
    metric: varies
    limit: see customer support / license agreement
    notes: Limits attach to the licensed tenant; specific numbers are surfaced by Whatfix support.
policies:
  - name: Backoff
    description: Use exponential backoff with jitter on 429 / 5xx; honor Retry-After when surfaced.
