naftiko: 1.0.0-alpha2
info:
  label: Whatfix Digital Adoption
  description: Unified digital adoption platform capability composing Whatfix's end-user management, content management, analytics,
    and segmentation APIs into customer-facing workflows for adoption monitoring, onboarding analytics, and content governance.
  tags:
  - Digital Adoption
  - Analytics
  - Onboarding
  - Content Management
  - User Segmentation
  - Change Management
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WHATFIX_API_TOKEN: WHATFIX_API_TOKEN
    WHATFIX_ACCOUNT_ID: WHATFIX_ACCOUNT_ID
    WHATFIX_USER_EMAIL: WHATFIX_USER_EMAIL
capability:
  consumes:
  - type: http
    namespace: whatfix
    baseUri: https://whatfix.com/api/v1
    description: Whatfix REST API v1 for digital adoption platform management.
    authentication:
      type: apikey
      key: x-whatfix-integration-key
      value: '{{WHATFIX_API_TOKEN}}'
      placement: header
    resources:
    - name: end-users
      path: /{{WHATFIX_ACCOUNT_ID}}/end-users
      description: Manage and query end users tracked by Whatfix.
      operations:
      - name: list-end-users
        method: GET
        description: Returns a paginated list of all end users tracked in the Whatfix platform.
        inputParameters:
        - name: page
          in: query
          type: integer
          required: false
          description: Page number.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Results per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upsert-end-user
        method: PUT
        description: Creates or updates an end user record with custom segmentation attributes.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
          description: Unique identifier for the end user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            userId: '{{tools.userId}}'
            email: '{{tools.email}}'
            name: '{{tools.name}}'
            attributes: '{{tools.attributes}}'
    - name: content
      path: /{{WHATFIX_ACCOUNT_ID}}/content
      description: Manage Whatfix content items including flows, tooltips, task lists, and more.
      operations:
      - name: list-content
        method: GET
        description: Returns a paginated list of all content items for the account.
        inputParameters:
        - name: type
          in: query
          type: string
          required: false
          description: Filter by content type.
        - name: status
          in: query
          type: string
          required: false
          description: Filter by content status.
        - name: page
          in: query
          type: integer
          required: false
        - name: pageSize
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics-flows
      path: /{{WHATFIX_ACCOUNT_ID}}/analytics/flows
      description: Flow analytics including views, completions, and completion rates.
      operations:
      - name: get-flow-analytics
        method: GET
        description: Returns analytics data for all flows for the specified date range.
        inputParameters:
        - name: startDate
          in: query
          type: string
          required: false
          description: Start date (ISO 8601).
        - name: endDate
          in: query
          type: string
          required: false
          description: End date (ISO 8601).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics-end-users
      path: /{{WHATFIX_ACCOUNT_ID}}/analytics/end-users
      description: End user engagement analytics.
      operations:
      - name: get-end-user-engagement
        method: GET
        description: Returns engagement analytics broken down by end user.
        inputParameters:
        - name: startDate
          in: query
          type: string
          required: false
        - name: endDate
          in: query
          type: string
          required: false
        - name: page
          in: query
          type: integer
          required: false
        - name: pageSize
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics-self-help
      path: /{{WHATFIX_ACCOUNT_ID}}/analytics/self-help
      description: Self Help widget content analytics.
      operations:
      - name: get-self-help-analytics
        method: GET
        description: Returns analytics for Self Help widget content views.
        inputParameters:
        - name: startDate
          in: query
          type: string
          required: false
        - name: endDate
          in: query
          type: string
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics-task-completion
      path: /{{WHATFIX_ACCOUNT_ID}}/analytics/task-completion
      description: Task list completion status per user.
      operations:
      - name: get-user-task-completion
        method: GET
        description: Returns task list completion status for each end user.
        inputParameters:
        - name: startDate
          in: query
          type: string
          required: false
        - name: endDate
          in: query
          type: string
          required: false
        - name: page
          in: query
          type: integer
          required: false
        - name: pageSize
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reports
      path: /{{WHATFIX_ACCOUNT_ID}}/reports/summary/mostPopularFlows
      description: Report downloads for analytics data.
      operations:
      - name: get-most-popular-flows
        method: GET
        description: Downloads a report of the most popular flows ranked by view count.
        inputParameters:
        - name: format
          in: query
          type: string
          required: false
          description: 'Output format: json or csv.'
        - name: startDate
          in: query
          type: string
          required: false
        - name: endDate
          in: query
          type: string
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: segments
      path: /{{WHATFIX_ACCOUNT_ID}}/segments
      description: User segments for content targeting.
      operations:
      - name: list-segments
        method: GET
        description: Returns all user segments defined in the Whatfix account.
        inputParameters:
        - name: page
          in: query
          type: integer
          required: false
        - name: pageSize
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: digital-adoption-api
    description: Unified REST API for digital adoption monitoring, user management, and analytics.
    resources:
    - path: /v1/end-users
      name: end-users
      description: End user tracking and segmentation.
      operations:
      - method: GET
        name: list-end-users
        description: List all end users tracked in Whatfix.
        call: whatfix.list-end-users
        with:
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: upsert-end-user
        description: Create or update an end user with segmentation attributes.
        call: whatfix.upsert-end-user
        with:
          userId: rest.userId
          email: rest.email
          name: rest.name
          attributes: rest.attributes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/content
      name: content
      description: Whatfix content items (flows, tooltips, task lists).
      operations:
      - method: GET
        name: list-content
        description: List all content items with optional type and status filters.
        call: whatfix.list-content
        with:
          type: rest.type
          status: rest.status
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/segments
      name: segments
      description: User segments for content targeting.
      operations:
      - method: GET
        name: list-segments
        description: List all user segments.
        call: whatfix.list-segments
        with:
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/flows
      name: flow-analytics
      description: Flow performance analytics.
      operations:
      - method: GET
        name: get-flow-analytics
        description: Get flow views, completions, and completion rates.
        call: whatfix.get-flow-analytics
        with:
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/end-users
      name: user-engagement
      description: End user engagement analytics.
      operations:
      - method: GET
        name: get-end-user-engagement
        description: Get content engagement broken down by end user.
        call: whatfix.get-end-user-engagement
        with:
          startDate: rest.startDate
          endDate: rest.endDate
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/self-help
      name: self-help-analytics
      description: Self Help widget content analytics.
      operations:
      - method: GET
        name: get-self-help-analytics
        description: Get Self Help content view counts.
        call: whatfix.get-self-help-analytics
        with:
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/task-completion
      name: task-completion
      description: Task list completion analytics per user.
      operations:
      - method: GET
        name: get-user-task-completion
        description: Get task list completion status for each end user.
        call: whatfix.get-user-task-completion
        with:
          startDate: rest.startDate
          endDate: rest.endDate
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports/popular-flows
      name: popular-flows-report
      description: Most popular flows report.
      operations:
      - method: GET
        name: get-most-popular-flows
        description: Download most popular flows report in JSON or CSV.
        call: whatfix.get-most-popular-flows
        with:
          format: rest.format
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: digital-adoption-mcp
    transport: http
    description: MCP server for AI-assisted digital adoption monitoring and content management.
    tools:
    - name: list-end-users
      description: List all end users tracked in Whatfix for adoption monitoring.
      hints:
        readOnly: true
        openWorld: true
      call: whatfix.list-end-users
      with:
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: upsert-end-user
      description: Sync an end user into Whatfix with segmentation attributes from your identity system.
      hints:
        readOnly: false
        idempotent: true
      call: whatfix.upsert-end-user
      with:
        userId: tools.userId
        email: tools.email
        name: tools.name
        attributes: tools.attributes
      outputParameters:
      - type: object
        mapping: $.
    - name: list-content
      description: List all Whatfix content items including flows, tooltips, task lists, and surveys.
      hints:
        readOnly: true
        openWorld: true
      call: whatfix.list-content
      with:
        type: tools.type
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: list-segments
      description: List all user segments defined for content targeting and personalization.
      hints:
        readOnly: true
        openWorld: true
      call: whatfix.list-segments
      outputParameters:
      - type: object
        mapping: $.
    - name: get-flow-analytics
      description: Get flow analytics showing views, completions, and completion rates for a date range.
      hints:
        readOnly: true
        openWorld: false
      call: whatfix.get-flow-analytics
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-end-user-engagement
      description: Get end user engagement analytics showing content interactions per user.
      hints:
        readOnly: true
        openWorld: false
      call: whatfix.get-end-user-engagement
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-self-help-analytics
      description: Get analytics for Self Help widget showing which content users search for and view.
      hints:
        readOnly: true
        openWorld: false
      call: whatfix.get-self-help-analytics
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user-task-completion
      description: Get task list completion status for onboarding or training tracking per user.
      hints:
        readOnly: true
        openWorld: false
      call: whatfix.get-user-task-completion
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-most-popular-flows
      description: Get a report of the most popular flows to understand what guidance users engage with most.
      hints:
        readOnly: true
        openWorld: false
      call: whatfix.get-most-popular-flows
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
