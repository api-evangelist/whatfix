description: FinOps shape for Whatfix is a SaaS platform license - flat platform fee plus user-license fees, with employee-facing apps billed by total licensed users and customer-facing apps billed by monthly active users.
sources:
  - https://whatfix.com/pricing/
notes: Public pricing page confirms the flat-fee + per-user model but provides no dollar figures. Meters reflect the documented billing shape; unit prices remain in the contract.
billingModel:
  pricingCategory: Subscription + Per-User
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Whatfix
  ServiceCategory: Digital Adoption Platform
  ProviderName: Whatfix
  PublisherName: Whatfix Inc.
  InvoiceIssuerName: Whatfix Inc.
  BillingCurrency: USD
meters:
  - name: platform_subscription
    unit: month
    aggregation: sum
    dimensions:
      - product_line
      - tier
  - name: licensed_users_employee
    unit: seat
    aggregation: max
    dimensions:
      - product_line
      - tier
  - name: monthly_active_users_customer
    unit: monthly_active_user
    aggregation: max
    dimensions:
      - product_line
      - tier
principles:
  - name: Visibility
    description: Use the Whatfix admin / Product Analytics dashboards to track active-user counts feeding the MAU-billed lines, and reconcile against the order form for licensed-seat lines.
  - name: Allocation
    description: Allocate by product line (DAP web, mobile, OS, Product Analytics) and by tenant / business unit; tag MAUs in customer-facing apps to the consuming product.
  - name: Optimization
    description: Right-size by trimming unused licensed seats at renewal, and by gating which customer surfaces actually count toward MAU billing.
  - name: Accountability
    description: Procurement / IT owns the master subscription and renewal; product owners track MAU drift since they directly drive variable cost.
maintainers:
