specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Whatfix
providerId: whatfix
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Digital Adoption
  - SaaS Management
  - User Onboarding
  - In-App Guidance
  - Contact Sales
description: Whatfix is a digital adoption platform sold via Talk-to-Sales. Pricing is composed of a flat platform fee plus user-license fees - employee-facing apps are licensed by total users with access, customer-facing apps by monthly active users (MAUs). No per-call API price is published; API access is included as part of the platform license.
sources:
  - https://whatfix.com/pricing/
notes: Whatfix's pricing page lists Standard / Premium / Enterprise tiers across Web & Desktop, Mobile, OS, and Product Analytics products, but each is "Get a Demo" / "Talk to Sales" - no public per-tier price. API quotas and rate limits are not published. Trimmed to a single Contact Sales plan covering the platform license; do not invent prices.
plans:
  - id: whatfix-contact-sales
    name: Contact Sales
    type: enterprise
    description: Whatfix is sold as a platform license (flat fee + user-license fees) covering the chosen tier (Standard / Premium / Enterprise) across Web & Desktop, Mobile, OS, and Product Analytics products. API access is bundled with the platform.
    entries:
      - label: Platform Flat Fee
        name: platform_flat_fee
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: User License - Employee-Facing
        name: user_license_employee
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: User License - Customer-Facing
        name: user_license_mau
        type: metered
        metric: monthly_active_user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Whatfix DAP (Web & Desktop)
      - name: Whatfix Mobile
      - name: Whatfix for Operating Systems
      - name: Whatfix Product Analytics
      - name: Whatfix API
      - name: Whatfix Android SDK
      - name: Whatfix iOS SDK
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
